<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Menu</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Menu">
<meta name="theme-color" content="#f7f1e8">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f1e8; --paper2:#fffdf8; --card:#fffdf8;
    --ink:#2a2018; --ink2:#6f6052; --faint:#a2937f;
    --line:#e9ddca; --line2:#f0e7d8;
    --accent:#b8542a; --accent-soft:#f3e6d8;
    --sage:#5f7d44; --sage-soft:#eaeede;
    --amber:#b07a23; --amber-soft:#f5e9d3;
    --shadow:0 1px 2px rgba(80,55,30,.04),0 8px 24px rgba(120,80,40,.06);
    --serif:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding-bottom:90px}
  .wrap{max-width:640px;margin:0 auto;padding:0 20px}
  /* header */
  header{padding:calc(env(safe-area-inset-top) + 30px) 20px 0;
    border-bottom:1px solid var(--line);background:var(--paper)}
  .wrap-h{max-width:640px;margin:0 auto;padding-bottom:20px}
  .eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);
    font-weight:600;margin-bottom:4px}
  .brand{font-family:var(--serif);font-size:46px;font-weight:500;letter-spacing:-1px;
    margin:0;line-height:.95;color:var(--ink)}
  .sub{color:var(--ink2);font-size:14.5px;margin-top:12px;display:flex;gap:12px;
    align-items:center;flex-wrap:wrap}
  .sub .date{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink)}
  .rung{background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:600;
    padding:4px 11px;border-radius:20px;letter-spacing:.2px}
  .view{display:none;animation:fade .3s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* technique banner */
  .tech{margin:22px 0 6px;background:linear-gradient(160deg,#fffdf8,#fbf3e7);
    border:1px solid var(--line);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow);
    position:relative;overflow:hidden}
  .tech:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .tech .k{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600}
  .tech .t{font-family:var(--serif);font-size:24px;font-weight:500;margin-top:6px;line-height:1.1}
  .tech .d{color:var(--ink2);font-size:14.5px;margin-top:9px;line-height:1.55}
  .secline{display:flex;align-items:center;gap:14px;margin:30px 2px 4px}
  .secline span{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);font-weight:600;white-space:nowrap}
  .secline:before,.secline:after{content:"";height:1px;background:var(--line);flex:1}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 21px;margin-top:15px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .12s ease,box-shadow .12s ease;position:relative}
  .card:active{transform:scale(.99)}
  @media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(80,55,30,.05),0 14px 32px rgba(120,80,40,.1)}}
  .ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .kind{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase}
  .kind .dot{width:7px;height:7px;border-radius:50%}
  .kind.comfort{color:var(--sage)} .kind.comfort .dot{background:var(--sage)}
  .kind.stretch{color:var(--accent)} .kind.stretch .dot{background:var(--accent)}
  .time{font-size:12.5px;color:var(--faint);font-weight:500}
  .card h2{font-family:var(--serif);font-size:23px;margin:0 0 7px;font-weight:500;line-height:1.15;color:var(--ink)}
  .card .tag{font-family:var(--serif);font-style:italic;color:var(--ink2);font-size:15px;line-height:1.5}
  .macros{display:flex;margin-top:16px;padding-top:15px;border-top:1px solid var(--line2)}
  .macro{flex:1;display:flex;flex-direction:column;align-items:flex-start}
  .macro b{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--ink)}
  .macro span{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;font-weight:600}
  .arrow{position:absolute;right:20px;bottom:20px;color:var(--accent);font-size:13px;
    font-weight:600;display:flex;align-items:center;gap:4px;opacity:.85}
  /* detail */
  #detail{position:fixed;inset:0;background:var(--paper);z-index:50;overflow-y:auto;
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);padding-bottom:50px}
  #detail.on{transform:translateX(0)}
  .back{position:sticky;top:0;background:rgba(247,241,232,.9);backdrop-filter:blur(10px);
    padding:calc(env(safe-area-inset-top) + 14px) 20px 13px;border-bottom:1px solid var(--line);
    font-weight:600;color:var(--accent);font-size:14.5px;cursor:pointer;z-index:2}
  .dwrap{max-width:640px;margin:0 auto;padding:22px 22px}
  .dwrap .kind{margin-bottom:14px}
  .dwrap h1{font-family:var(--serif);font-size:33px;margin:0 0 6px;line-height:1.08;font-weight:500;letter-spacing:-.5px}
  .dwrap .dtime{color:var(--faint);font-size:13.5px;font-weight:500;margin-bottom:4px}
  .dmacros{display:flex;background:var(--paper2);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;margin:20px 0 4px;box-shadow:var(--shadow)}
  .dmacros .m{flex:1;padding:15px 6px;text-align:center;border-right:1px solid var(--line2)}
  .dmacros .m:last-child{border-right:0}
  .dmacros .m b{font-family:var(--serif);display:block;font-size:23px;font-weight:500}
  .dmacros .m span{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
  .sec{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);
    font-weight:600;margin:30px 0 14px;display:flex;align-items:center;gap:12px}
  .sec:after{content:"";height:1px;background:var(--line);flex:1}
  ul.ing{list-style:none;padding:0;margin:0}
  ul.ing li{padding:11px 0 11px 24px;border-bottom:1px solid var(--line2);position:relative;
    font-size:15.5px;color:var(--ink);line-height:1.45}
  ul.ing li:before{content:"";position:absolute;left:4px;top:18px;width:6px;height:6px;
    border-radius:50%;background:var(--accent);opacity:.55}
  ol.steps{padding:0;margin:0;counter-reset:s;list-style:none}
  ol.steps li{position:relative;padding:0 0 22px 46px;counter-increment:s;font-size:15.5px;
    line-height:1.62;color:var(--ink)}
  ol.steps li:before{content:counter(s);position:absolute;left:0;top:-3px;width:31px;height:31px;
    background:var(--accent);color:#fffdf8;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-family:var(--serif);font-weight:500;font-size:15px}
  ol.steps li:not(:last-child):after{content:"";position:absolute;left:15px;top:32px;bottom:8px;width:1px;background:var(--line)}
  .why{background:linear-gradient(160deg,#fffdf8,#fbf3e7);border:1px solid var(--line);
    border-radius:16px;padding:18px 20px;margin-top:10px;box-shadow:var(--shadow)}
  .why .k{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:7px}
  .why p{margin:0;color:var(--ink);font-size:14.5px;line-height:1.6;font-family:var(--serif);font-style:italic}
  .src{margin-top:24px;font-size:12.5px;color:var(--faint);line-height:1.55}
  .src a{color:var(--ink2)}
  /* history + resources */
  .hrow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;
    margin-top:11px;box-shadow:var(--shadow)}
  .hrow .d{font-family:var(--serif);font-size:17px;font-weight:500}
  .hrow .v{font-size:13px;color:var(--ink2);margin-top:5px;line-height:1.5}
  .verdict{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:12px;
    margin-right:8px;letter-spacing:.5px;text-transform:uppercase;vertical-align:1px}
  .verdict.liked{background:var(--sage-soft);color:var(--sage)}
  .verdict.loved{background:var(--amber-soft);color:var(--amber)}
  .verdict.no{background:#f5e0dc;color:#b5503f}
  .verdict.fine{background:var(--line2);color:var(--ink2)}
  .note{color:var(--faint);font-size:13.5px;line-height:1.6;margin:18px 2px;font-family:var(--serif);font-style:italic}
  .rsrc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    margin-top:11px;box-shadow:var(--shadow)}
  .rsrc b{font-family:var(--serif);font-size:17px;font-weight:500}
  .rsrc p{margin:5px 0 0;color:var(--ink2);font-size:13.5px;line-height:1.5}
  .empty{color:var(--faint);text-align:center;padding:34px;font-size:14px;font-style:italic;font-family:var(--serif)}
  /* tab bar */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,248,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:40}
  nav button{flex:1;background:none;border:0;color:var(--faint);padding:12px 0 13px;
    font-size:10.5px;font-weight:600;letter-spacing:.4px;cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:4px;font-family:var(--sans);transition:color .15s}
  nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  nav button.on{color:var(--accent)}
</style>
</head>
<body>

<header><div class="wrap-h">
  <div class="eyebrow">Tonight's cooking</div>
  <h1 class="brand">The Menu</h1>
  <div class="sub" id="subhead"></div>
</div></header>

<main class="wrap">
  <section id="today" class="view on"></section>
  <section id="history" class="view"></section>
  <section id="resources" class="view"></section>
</main>

<div id="detail"></div>

<nav>
  <button data-v="today" class="on">
    <svg viewBox="0 0 24 24"><path d="M5 11h14M5 11a7 7 0 0114 0M3 11h18M6 15h12l-1 5H7z"/></svg>Menu</button>
  <button data-v="history">
    <svg viewBox="0 0 24 24"><path d="M4 5h13a2 2 0 012 2v12a1 1 0 01-1 1H6a2 2 0 01-2-2zM4 5v12M8 9h7M8 13h7"/></svg>History</button>
  <button data-v="resources">
    <svg viewBox="0 0 24 24"><path d="M6 4h12a1 1 0 011 1v15l-7-4-7 4V5a1 1 0 011-1z"/></svg>Sources</button>
</nav>

<script>
/* ============================================================
   DATA — the nightly task rewrites this block each evening.
   Everything below DATA is the renderer and stays fixed.
   ============================================================ */
const DATA = {
  date: "Saturday, June 27, 2026",
  rung: "Rung 3 · you sear, use fat, and build a pan sauce",
  technique: {
    name: "The even dice (take two)",
    blurb: "Yesterday the lesson moved to the cutting board with a fresh pico. Tonight we drill the same skill once more, because a knife move sticks through reps, not a single try. Same goal: cut everything to one small, even size so it cooks evenly and sits neatly on a fork. This time the canvas is a steak salsa — your favorite protein, a quick raw salsa where the cut is the whole dish. Knock this out and the dice is yours for good."
  },
  options: [
    {
      id:"steakbites", title:"Garlic Butter Steak Bites", kind:"comfort", time:"~15 min",
      tag:"Your steak, in bite-size form — a hot, fast sear, then foaming garlic butter spooned over. Pure confidence food, and squarely in your wheelhouse.",
      cal:560, protein:46, fat:40, carb:2,
      ingredients:[
        "6 oz sirloin or strip steak, cut into ~1-inch cubes",
        "1 tbsp neutral oil",
        "1.5 tbsp butter",
        "2 garlic cloves, smashed",
        "Salt, pepper, a pinch of parsley if you have it"
      ],
      steps:[
        "Pat the steak cubes very dry and season hard with salt and pepper. Dry meat browns; wet meat steams.",
        "Heat the pan medium-high 2–3 min, add the oil, and swirl to coat. It should shimmer.",
        "Add the cubes in one loose layer — don't crowd them. Sear undisturbed about 2 min, then toss and give 1–2 min more until browned but still pink inside.",
        "Drop the heat to medium-low. Add the butter and smashed garlic, and as the butter foams, tilt the pan and spoon it over the bites for about a minute — that's basting.",
        "Pull the pan off the heat, scatter parsley over, and eat right away while they're hot."
      ],
      why:null,
      src:'Rewritten from Downshiftology, <a href="https://downshiftology.com/recipes/garlic-butter-steak-bites/">Garlic Butter Steak Bites</a>. Macros are estimates.'
    },
    {
      id:"porkchop", title:"Pork Chop with Mustard Pan Sauce", kind:"comfort", time:"~20 min",
      tag:"A new protein, the same move you already own: sear it hard, then build a quick pan sauce off the browned bits. Dijon and a splash of cream do the work.",
      cal:520, protein:39, fat:38, carb:3,
      ingredients:[
        "1 boneless pork chop, ~6 oz, about 1 inch thick",
        "1 tbsp neutral oil",
        "1 tbsp butter",
        "1 tsp Dijon mustard",
        "2 tbsp chicken broth (or water)",
        "1 tbsp cream or a splash of milk",
        "Salt and pepper"
      ],
      steps:[
        "Pull the chop out 15 min early, pat it bone-dry, and season both sides with salt and pepper.",
        "Heat the pan medium-high with the oil until it shimmers. Lay the chop in and sear 3–4 min per side until golden and it reads 145°F in the center. Move it to a plate to rest.",
        "Drop the heat to medium. Add the broth and scrape the browned bits off the bottom with a spoon — that fond is your flavor.",
        "Stir in the Dijon and cream and let it bubble 1–2 min until it thickens just enough to coat a spoon. Swirl in the butter off the heat for shine.",
        "Spoon the sauce over the rested chop and any juices that pooled on the plate."
      ],
      why:null,
      src:'Pork chop method from Inspired Taste, <a href="https://www.inspiredtaste.net/37062/juicy-skillet-pork-chops/">Juicy Skillet Pork Chops</a>; mustard pan sauce from Happily From Scratch, <a href="https://www.ericajulson.com/seared-pork-chops-with-mustard-pan-sauce/">Seared Pork Chops with Mustard Pan Sauce</a>. Macros are estimates.'
    },
    {
      id:"soygarlicchx", title:"Crispy Chicken Thighs, Soy-Garlic", kind:"comfort", time:"~25 min",
      tag:"Sear chicken thighs until deep golden, then glaze them in a quick soy-garlic-honey pan sauce. A pan sauce in a new key — savory and a little sweet.",
      cal:500, protein:39, fat:33, carb:9,
      ingredients:[
        "2 boneless skinless chicken thighs, ~7 oz total",
        "1 tbsp neutral oil",
        "2 garlic cloves, finely chopped",
        "1 tbsp soy sauce",
        "1 tsp honey",
        "1 tsp sesame oil",
        "Salt and pepper"
      ],
      steps:[
        "Pat the thighs very dry and season with salt and pepper. Dry chicken is how you get a real golden crust.",
        "Heat the pan medium-high with the oil. Lay the thighs smooth-side down and sear undisturbed 6–7 min until deep golden, then flip and give 4–5 min more until cooked through (165°F).",
        "Move the chicken to a plate. Drop the heat to medium-low, add the garlic, and stir 20 sec until fragrant — don't let it brown.",
        "Add the soy sauce, honey, and sesame oil. Swirl the pan and let it bubble 30–60 sec into a glossy glaze, scraping up the browned bits.",
        "Return the thighs, turn them to coat in the glaze, and spoon the rest over the top."
      ],
      why:null,
      src:'Soy-garlic glaze from From Valerie’s Kitchen, <a href="https://www.fromvalerieskitchen.com/soy-garlic-chicken/">Soy Garlic Chicken</a>; pan-sear method from Feel Good Foodie, <a href="https://feelgoodfoodie.net/recipe/pan-seared-chicken-thighs/">Pan Seared Chicken Thighs</a>. Macros are estimates.'
    },
    {
      id:"steaksalsa", title:"Seared Steak with Avocado-Tomato Salsa", kind:"stretch", time:"~25 min",
      tag:"Tonight's knife drill, round two. The salsa is all dicing and no new cooking, so every bit of focus goes to one thing: cutting tomato, onion, and avocado to the same small, even square.",
      cal:580, protein:49, fat:36, carb:17,
      ingredients:[
        "6 oz sirloin or strip steak",
        "1 tbsp neutral oil",
        "1 ripe tomato",
        "¼ red onion",
        "½ jalapeño, optional (seeds out for less heat)",
        "½ avocado",
        "Small handful cilantro",
        "Juice of ½ lime, salt, pepper"
      ],
      steps:[
        "Make the salsa first so the flavors mingle. Aim for an even ¼-inch dice so every bite has a little of everything. Halve the tomato, scoop out the watery seeds, slice into strips, then cross-cut into small squares.",
        "Dice the onion the same size: slice one way, then the other. Finely chop the jalapeño and cilantro. Combine in a bowl with the lime juice and a pinch of salt.",
        "Dice the avocado to match and fold it in gently at the end so it keeps its shape. Set the bowl aside while you cook.",
        "Pat the steak dry and season hard with salt and pepper. Heat the pan medium-high with the oil and sear 3–4 min per side for medium-rare. Rest it 5 min, then slice against the grain.",
        "Pile the steak on the plate and spoon the avocado-tomato salsa over the top. Taste and add a squeeze more lime if it needs lift."
      ],
      why:"Even dice is the quiet skill under nearly everything ahead — salsa, sauté, stir-fry, hash. One try doesn't make it stick, so tonight is rep two: same cut, new dish. In a raw salsa there's nowhere to hide a sloppy chunk, which is exactly why it's the best place to drill. Land it twice and your knife stops being the thing slowing you down.",
      src:'Pico method from RecipeTin Eats, <a href="https://www.recipetineats.com/pico-de-gallo-authentic/">Pico de Gallo</a> (avocado folded in, per What’s Gaby Cooking, <a href="https://whatsgabycooking.com/pico-de-gallo/">Pico de Gallo</a>); steak method from Downshiftology, <a href="https://downshiftology.com/recipes/garlic-butter-steak-bites/">searing basics</a>. Macros are estimates.'
    }
  ],
  history:[
    {date:"Thursday, June 25, 2026", dish:"Bacon, Eggs & Rice with Homemade Chili Oil", verdict:"liked", note:"Improvised a chili oil — bacon fat, minced garlic, spicy olive oil, chili flakes — over bacon, eggs, and rice. Tasty but ran too hot; too much spicy oil. Next time build from mild and add it off heat by the teaspoon."},
    {date:"Tuesday, June 23, 2026", dish:"Chicken Thighs with Lemon-Butter Pan Sauce", verdict:"liked", note:"First solo pan sauce — deglazed the fond, mounted cold butter, lemon as the acid. Cleared rung 3."},
    {date:"Before The Menu", dish:"Pan-seared steak", verdict:"liked", note:"His go-to — can sear a single protein in a pan."},
    {date:"Before The Menu", dish:"Bacon, low and slow", verdict:"liked", note:"Understands fat as a cooking medium."},
    {date:"Before The Menu", dish:"Fried eggs in bacon fat", verdict:"liked", note:"Cooks eggs in the rendered fat."}
  ],
  resources:[
    {name:"Serious Eats", note:"Technique-first; explains the why. Best for learning a method — searing, pan sauces, emulsions."},
    {name:"Budget Bytes", note:"Cheap, simple, one-pan / one-pot. Dorm-kitchen friendly."},
    {name:"Downshiftology", note:"Clean one-pan dinners with clear steps."},
    {name:"NatashasKitchen", note:"Reliable, well-photographed, beginner-clear. Great for proteins and the basics."},
    {name:"Cooking Classy", note:"Approachable, well-tested recipes; strong on classic proteins and finishes."}
  ]
};

/* ============================================================
   RENDERER — fixed.
   ============================================================ */
const $ = s => document.querySelector(s);
const kindLabel = k => k==='stretch' ? 'Stretch' : 'Comfort';
document.getElementById('subhead').innerHTML =
  `<span class="date">${DATA.date}</span><span class="rung">${DATA.rung}</span>`;

// TODAY
(function(){
  let h = `<div class="tech"><div class="k">Technique of the night</div>
    <div class="t">${DATA.technique.name}</div>
    <div class="d">${DATA.technique.blurb}</div></div>
    <div class="secline"><span>Four ways to cook tonight</span></div>`;
  DATA.options.forEach(o=>{
    h += `<div class="card" data-id="${o.id}">
      <div class="ctop">
        <span class="kind ${o.kind}"><span class="dot"></span>${kindLabel(o.kind)}</span>
        <span class="time">${o.time}</span>
      </div>
      <h2>${o.title}</h2>
      <div class="tag">${o.tag}</div>
      <div class="macros">
        <div class="macro"><b>${o.cal}</b><span>cal</span></div>
        <div class="macro"><b>${o.protein}g</b><span>protein</span></div>
        <div class="macro"><b>${o.fat}g</b><span>fat</span></div>
        <div class="macro"><b>${o.carb}g</b><span>carb</span></div>
      </div>
      <span class="arrow">Recipe ›</span></div>`;
  });
  $('#today').innerHTML = h;
})();

// HISTORY
(function(){
  let h = `<div class="secline" style="margin-top:26px"><span>Cooked so far</span></div>`;
  if(!DATA.history.length){ h += `<div class="empty">Nothing logged yet. Cook something tonight and tell Claude how it went.</div>`; }
  DATA.history.forEach(r=>{
    h += `<div class="hrow"><div class="d">${r.dish}</div>
      <div class="v"><span class="verdict ${r.verdict}">${r.verdict}</span>${r.date} · ${r.note}</div></div>`;
  });
  h += `<p class="note">Logging is conversational: each night Claude asks what you made and whether you liked it. One line back, and tomorrow's menu bends toward it.</p>`;
  $('#history').innerHTML = h;
})();

// RESOURCES
(function(){
  let h = `<div class="secline" style="margin-top:26px"><span>Where the recipes come from</span></div>`;
  DATA.resources.forEach(r=>{
    h += `<div class="rsrc"><b>${r.name}</b><p>${r.note}</p></div>`;
  });
  h += `<p class="note">Every recipe is sourced from a vetted site, rewritten to your level, with macros estimated per ingredient and the original cited on its page.</p>`;
  $('#resources').innerHTML = h;
})();

// DETAIL view
function openDetail(id){
  const o = DATA.options.find(x=>x.id===id);
  let h = `<div class="back" onclick="closeDetail()">‹ Back to the menu</div><div class="dwrap">
    <span class="kind ${o.kind}"><span class="dot"></span>${kindLabel(o.kind)}</span>
    <h1>${o.title}</h1>
    <div class="dtime">${o.time}</div>
    <div class="dmacros">
      <div class="m"><b>${o.cal}</b><span>cal</span></div>
      <div class="m"><b>${o.protein}g</b><span>protein</span></div>
      <div class="m"><b>${o.fat}g</b><span>fat</span></div>
      <div class="m"><b>${o.carb}g</b><span>carb</span></div>
    </div>
    <div class="sec">Ingredients · 1 serving</div>
    <ul class="ing">${o.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
    <div class="sec">Method</div>
    <ol class="steps">${o.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
  if(o.why){ h += `<div class="why"><div class="k">Why it matters</div><p>${o.why}</p></div>`; }
  h += `<div class="src">Macros are a per-serving estimate from standard ingredient values — treat as a ballpark.<br>${o.src}</div></div>`;
  const d = $('#detail'); d.innerHTML = h; d.classList.add('on'); d.scrollTop=0;
}
function closeDetail(){ $('#detail').classList.remove('on'); }

document.addEventListener('click', e=>{
  const card = e.target.closest('.card');
  if(card) openDetail(card.dataset.id);
});

// TABS
document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById(b.dataset.v).classList.add('on');
    window.scrollTo(0,0);
  });
});
</script>
</body>
</html>
